        buildConfigField("long", "BUILD_TIME_MILLIS","${System.currentTimeMillis()}")

        ndk {
            moduleName "ncnn"
            abiFilters "arm64-v8a" // "x86_64" // armeabi-v7a
        }

        minSdkVersion 24
        targetSdkVersion 24

        externalNativeBuild {
            cmake {
                cFlags "-ffunction-sections -fdata-sections -fexceptions -s"
