// ============================================================
// 将 CPython 标准库打包为 zip 放入 assets，供首次启动时自动释放到 PYTHONHOME
// 源目录: CPython-android/build/aarch64/install (交叉编译产物)
// 输出:   app/src/main/assets/python3-stdlib.zip
// zip 内部结构保持 install/ 下的相对路径: lib/python3.13/..., bin/python3 等
// ============================================================
tasks.register('packagePythonStdlib', Zip) {
    def stdlibSrc = rootProject.file("../CPython-android/build/aarch64/install")
    from(stdlibSrc) {
        // 排除不需要的大文件：头文件、pkgconfig、静态库
        exclude 'include/**'
        exclude 'lib/pkgconfig/**'
        exclude 'lib/**/*.a'
        // 排除 __pycache__
        exclude '**/__pycache__/**'
        // 排除 bin/ 中的符号链接（idle3, pydoc3, python3, python3-config, pip, pip3.*）
        // 只保留实际文件（python3.13, pip3 等），符号链接在 ensurePythonHome 中重建
        exclude 'bin/idle3'
        exclude 'bin/pydoc3'
        exclude 'bin/python3'
        exclude 'bin/python3-config'
        exclude 'bin/pip'
        // 排除 get-pip.py（pip 已内置，不再需要）
        exclude 'get-pip.py'
        exclude 'setup-pip.sh'
    }
    // 跳过无法读取的符号链接文件
    doNotTrackState("源目录包含符号链接，禁用增量构建状态跟踪")
    archiveFileName = 'python3-stdlib.zip'
    destinationDirectory = file('src/main/assets')

    // 仅当源目录存在时才执行
    onlyIf { stdlibSrc.exists() }
}

// ============================================================
// 将 Magisk 自启动模块打包为 zip 放入 assets，供 App 内一键安装
// 源目录: magisk-module/ (module.prop, service.sh, META-INF/)
// 输出:   app/src/main/assets/yyds_autostart.zip
// ============================================================
tasks.register('packageMagiskModule', Zip) {
    def moduleSrc = rootProject.file("magisk-module")
    from(moduleSrc)
    archiveFileName = 'yyds_autostart.zip'
    destinationDirectory = file('src/main/assets')
    onlyIf { moduleSrc.exists() }
}

// 在 preBuild 之前自动执行打包
tasks.configureEach { task ->
    if (task.name == 'preBuild') {
        task.dependsOn 'packagePythonStdlib'
        task.dependsOn 'packageMagiskModule'
    }
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
    options.compilerArgs << "-Xlint:unchecked" << "-Xlint:deprecation"
}

repositories {
    mavenCentral()
    maven {
