        }
    }

    externalNativeBuild {
        cmake {
            version "3.22.1"
            path file('src/main/jni/CMakeLists.txt')
        }
    }

    ndkVersion '27.0.12077973'

    // 防止 AAPT 对 assets 中的 zip 二次压缩（已经是压缩格式）
    aaptOptions {
        noCompress 'python3-stdlib.zip', 'yyds_autostart.zip'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    buildTypes {
        debug {
            resValue "string", "app_name", "Yyds.Auto"
            minifyEnabled false
            zipAlignEnabled false  // Zipalign优化
            shrinkResources false // 开这个回界面会卡死
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), proguard
            signingConfig signingConfigs.debug

            externalNativeBuild {
                cmake {
                    arguments "-DIS_APP_RELEASE=0 -DCMAKE_VERBOSE_MAKEFILE:BOOL=ON"
                    cppFlags "-std=c++17 -g -fexceptions"
                }
            }
        }

        release {
            resValue "string", "app_name", "Yyds.Auto"
            minifyEnabled true
            zipAlignEnabled true // Zipalign优化
            // Enables resource shrinking, which is performed by the
            // Android Gradle plugin.
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), proguard
            signingConfig signingConfigs.release
            multiDexEnabled true
            debuggable false
            jniDebuggable false
            //renderscriptDebuggable false // obsolete, removed
            externalNativeBuild {
                cmake {
                    arguments "-DIS_APP_RELEASE=1"
                    cppFlags "-std=c++17 -fvisibility=hidden -fvisibility-inlines-hidden -fexceptions -s"
                }
            }
        }

        applicationVariants.all { variant ->
              variant.outputs.all { output ->
                def outputFile = output.outputFile
                if (variant.buildType.name != "debug") {
                    if (outputFile != null && outputFile.name.endsWith('.apk')) {
                        //输出apk名称为：渠道名_版本名_时间.apk
                        outputFileName = "Yyds.Auto_${defaultConfig.versionCode}_${defaultConfig.versionName}_${variant.buildType.name}.apk"
                    }
                } else {
                }
            }
        }
    }

    packagingOptions {
        jniLibs.useLegacyPackaging = true // 让 .so 以压缩方式存入APK + 设置 extractNativeLibs=true，避免打包后APK安装失败
        exclude 'META-INF/DEPENDENCIES'
        exclude 'META-INF/INDEX.LIST'
        exclude 'META-INF/io.netty.versions.properties'
        exclude 'META-INF/LICENSE.txt'
        exclude 'META-INF/license.txt'
        exclude 'META-INF/NOTICE'
        exclude 'META-INF/NOTICE.txt'
        exclude 'META-INF/notice.txt'
        exclude 'META-INF/ASL2.0'
        exclude "**/Log4j2Plugins.dat"
        exclude("META-INF/*.kotlin_module")
    }

    sourceSets {
        main {
            jniLibs.srcDir(['libs'])
        }
    }

    dataBinding {
        enabled true
    }

    buildFeatures {
        prefab true
        viewBinding true
        aidl true
        buildConfig true
    }

    kotlinOptions {
        jvmTarget = '11'
    }

    lintOptions {
        disable 'Deprecated', 'ExpiredTargetSdkVersion'
        abortOnError false
    }
}

